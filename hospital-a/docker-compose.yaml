version: "3.8"

# Hospital A — CityCare Multispeciality Hospital (Primary)
# Deploy on PC-1 / internal network 1
# Contains: Months 1-10 progress reports + CT/X-ray months 1-2

services:
  care-backend-a:
    build:
      context: ./care_be
      dockerfile: docker/prod.Dockerfile
    container_name: hospital-a-backend
    ports:
      - "9001:9000"
    command: bash -c "python3 /app/install_plugins.py && /app/start.sh"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECURE_SSL_REDIRECT=False
      - DJANGO_SESSION_COOKIE_SECURE=False
      - DJANGO_CSRF_COOKIE_SECURE=False
      - CORS_ALLOW_ALL_ORIGINS=True
      - DATABASE_URL=postgres://postgres:postgres@db-a:5432/care_a
      - POSTGRES_DB=care_a
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db-a
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis-a:6379/0
      - SECRET_KEY=hospital-a-secret-key-change-in-production
      - ADDITIONAL_PLUGS=[{"name":"care_medgemma","package_name":"/app/care_medgemma","version":""}]
      - HOSPITAL_ID=HOSP-CITYCARE-A
      - HOSPITAL_NAME=CityCare Multispeciality Hospital
      - UHI_SWITCH_URL=http://uhi-switch.example.com:8080
    volumes:
      - ./care_medgemma:/app/care_medgemma
      - ./patient_data:/app/patient_data
    depends_on:
      - db-a
      - redis-a
    restart: unless-stopped

  care-frontend-a:
    image: ghcr.io/ohcnetwork/care_fe:latest
    container_name: hospital-a-frontend
    ports:
      - "4001:80"
    environment:
      - REACT_CARE_API_URL=http://localhost:9001
      - NODE_OPTIONS=--max-old-space-size=4096

  db-a:
    image: postgres:15-alpine
    container_name: hospital-a-db
    environment:
      - POSTGRES_DB=care_a
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - hospital_a_db:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    deploy:
      resources:
        limits:
          memory: 512m

  redis-a:
    image: redis:7-alpine
    container_name: hospital-a-redis
    ports:
      - "6381:6379"
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  hospital_a_db:
