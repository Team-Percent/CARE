version: "3.8"

# Hospital B — Metro Radiology & Diagnostics Center (Referral)
# Deploy on PC-2 / internal network 2
# Contains: CT/X-ray months 3-8 + baseline chest X-ray image

services:
  care-backend-b:
    build:
      context: ./care_be
      dockerfile: docker/prod.Dockerfile
    container_name: hospital-b-backend
    ports:
      - "9002:9000"
    command: bash -c "python3 /app/install_plugins.py && /app/start.sh"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
      - DJANGO_SECURE_SSL_REDIRECT=False
      - DJANGO_SESSION_COOKIE_SECURE=False
      - DJANGO_CSRF_COOKIE_SECURE=False
      - CORS_ALLOW_ALL_ORIGINS=True
      - DATABASE_URL=postgres://postgres:postgres@db-b:5432/care_b
      - POSTGRES_DB=care_b
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST=db-b
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis-b:6379/0
      - SECRET_KEY=hospital-b-secret-key-change-in-production
      - ADDITIONAL_PLUGS=[{"name":"care_medgemma","package_name":"/app/care_medgemma","version":""}]
      - HOSPITAL_ID=HOSP-METRO-B
      - HOSPITAL_NAME=Metro Radiology & Diagnostics Center
      - UHI_SWITCH_URL=http://uhi-switch.example.com:8080
    volumes:
      - ./care_medgemma:/app/care_medgemma
      - ./patient_data:/app/patient_data
    depends_on:
      - db-b
      - redis-b
    restart: unless-stopped

  care-frontend-b:
    image: ghcr.io/ohcnetwork/care_fe:latest
    container_name: hospital-b-frontend
    ports:
      - "4002:80"
    environment:
      - REACT_CARE_API_URL=http://localhost:9002
      - NODE_OPTIONS=--max-old-space-size=4096

  db-b:
    image: postgres:15-alpine
    container_name: hospital-b-db
    environment:
      - POSTGRES_DB=care_b
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - hospital_b_db:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    deploy:
      resources:
        limits:
          memory: 512m

  redis-b:
    image: redis:7-alpine
    container_name: hospital-b-redis
    ports:
      - "6382:6379"
    deploy:
      resources:
        limits:
          memory: 128m

volumes:
  hospital_b_db:
